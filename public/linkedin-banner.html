<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Banner Download</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 20px; padding: 24px; }
    h1 { color: #f1f5f9; font-size: 1rem; margin: 0; font-weight: 600; }
    canvas { border-radius: 10px; max-width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
    .btn { background: #0ea5e9; color: #fff; border: none; padding: 14px 40px; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #0284c7; }
    small { color: #475569; font-size: .78rem; }
  </style>
</head>
<body>
  <h1>NordicWings — LinkedIn Banner (1584 × 396 px)</h1>
  <canvas id="c" width="1584" height="396"></canvas>
  <button class="btn" onclick="dl()">⬇ Download PNG</button>
  <small>Upload to LinkedIn → Profile → pencil icon on background photo</small>

  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');

    // Background
    const g = x.createLinearGradient(0, 0, 1584, 396);
    g.addColorStop(0, '#0c1f3a');
    g.addColorStop(1, '#0c4a6e');
    x.fillStyle = g;
    x.fillRect(0, 0, 1584, 396);

    // Thin accent line at bottom
    x.fillStyle = '#38bdf8';
    x.fillRect(0, 388, 1584, 8);

    // Name
    x.fillStyle = '#ffffff';
    x.font = 'bold 64px Georgia, serif';
    x.fillText('Jennamae Saarela', 80, 180);

    // Title
    x.fillStyle = '#38bdf8';
    x.font = '500 26px -apple-system, sans-serif';
    x.fillText('Founder & CEO  ·  NordicWings  ·  Oulu, Finland', 80, 230);

    // Website
    x.fillStyle = '#64748b';
    x.font = '400 20px -apple-system, sans-serif';
    x.fillText('nordicwings.net', 80, 270);

    function dl() {
      const a = document.createElement('a');
      a.download = 'NordicWings-LinkedIn-Banner.png';
      a.href = c.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
